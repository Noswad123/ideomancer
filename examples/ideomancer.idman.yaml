schemaVersion: 0.2.0
id: ideomancer
name: Ideomancer
version: 0.1.0
summary: Define tools/systems at a high level and generates visualizations about such systems 

lore:
  aliases: []
  epithet: "Shaper of Intent"
  description: |
    Out of the primordial ether, all kinds of spirits manifest

resources:
  - name: Manifest
    kind: consumable
    defaultMime: application/vnd.map.manifest+json
    mimeTypes: [application/vnd.map.manifest+json, application/json]
    schemaRef: ./schemas/manifest.schema.json
    description: A document defines an system at a high level
  - name: ManifestValidation
    kind: consumable
    schemaRef: ./schemas/manifest-validation.schema.json
    mimeTypes: [application/json]
    defaultMime: application/json
  - name: SystemMap
    kind: consumable
    schemaRef: ./schemas/system-map.schema.json
    mimeTypes: [application/vnd.map.graph+json, text/mermaid, text/vnd.graphviz-dot]
    defaultMime: application/vnd.map.graph+json
  - name: Watcher
    kind: process
    schemaRef: ./schemas/watcher.schema.json
    lifecycle:
      states: [created, running, stopped]
      defaultState: created

events:
  - name: map.generated
    payloadRef: ./schemas/events/map-generated.json
  - name: manifest.saved
    payloadRef: ./schemas/events/manifest-saved.json

ops:
  - name: create.manifest
    description:
      - Create an empty manifest file
    produces:
      - resource: Manifest
    errors:
      mimes: [application/problem+json]
      exitCodes:
        - { code: 2, meaning: "already exists" }
      schemaRef: ./schemas/errors/create-manifest.problem.schema.json

  - name: validate.manifest
    consumes:
      - resource: Manifest
    produces:
      - resource: ManifestValidation
    errors:
      mimes: [application/problem+json]
      exitCodes:
        - { code: 2, meaning: "validation error" }
        - { code: 3, meaning: "manifest not found" }
      schemaRef: ./schemas/errors/validate.problem.schema.json

  - name: generate.systemMap
    consumes:
      - resource: Manifest
    produces:
      - resource: SystemMap

  - name: start.watcher
    produces:
      - resource: watcher

buses:
  - id: default-stdout
    kind: stdout.ndjson
    contentType: application/cloudevents+json

  - id: local-file
    kind: file.append
    path: ./out/events.log
    contentType: application/cloudevents+json

  # Example brokered bus
  - id: dev-nats
    kind: nats
    url: nats://127.0.0.1:4222
    contentType: application/cloudevents+json

interfaces:
  cli:
    commands:
      - name: manifest:init
        op: create.manifest
        args:
          - { name: id, type: string, required: false }
          - { name: name, type: string, required: true }

      - name: manifest:validate
        op: validate.manifest

      - name: generate:map
        op: generate.systemMap
        args:
          - { name: format, type: string, required: false }   # mermaid|dot|json
          - { name: resolve, type: string, required: false }   # default: opaque|shallow|deep
          - { name: allow-missing, type: string, required: false }
          - { name: max-depth, type: string, required: false }

      - name: watcher:run
        op: start.watcher
        subscribes:
          bus: dev-nats
          topic: manifest.saved

  # HTTP/RPC are optional; provided here only if you later expose them
  http:
    openapi: ./apis/ideomancer.openapi.yaml

