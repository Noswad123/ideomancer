schemaVersion: 0.1.0
id: mindweaver           # machine id
name: Mind Weaver        # human/lore name
kind: cosmic-being | spirit | utility
summary: Short description of what this tool does
owner: noswad-lamaj
license: MIT
version: 0.3.2
platforms:               # where this runs
  - os: macos | linux | windows
    arch: x64 | arm64
runtimes:                # what composes this tool
  - name: core
    lang: go
    entrypoint: ./bin/mindweaver
  - name: ui
    lang: python
    entrypoint: python ./ui/main.py
capabilities:            # WHAT it can do (language-agnostic)
  resources:
    - name: Note
      operations: [create, read, update, delete, link, search]
      schemaRef: ./schemas/note.schema.json
    - name: Topic
      operations: [create, attach, list]
      schemaRef: ./schemas/topic.schema.json
  events:
    - name: note.woven
      payloadRef: ./schemas/note-event.schema.json
    - name: topic.linked
      payloadRef: ./schemas/topic-event.schema.json
interfaces:              # HOW others can talk to it (choose any)
  http:
    openapi: ./apis/mindweaver.openapi.yaml
    audience: local-only | private | public
  cli:
    commands:
      - name: notes:create
        args:
          - name: title
            type: string
            required: true
          - name: body
            type: string
        stdout: json  # contract: prints Note JSON to stdout
      - name: notes:search
        args:
          - name: query
            type: string
        stdout: json
  rpc:
    - protocol: jsonrpc-2.0
      transport: stdio
      methods:
        - name: weaveNote
          requestRef: ./schemas/weave.request.json
          responseRef: ./schemas/weave.response.json
  sockets:
    - kind: unix | tcp
      address: /tmp/mindweaver.sock
      protocol: grpc
      protoRef: ./apis/mindweaver.proto
  files:
    - direction: ingest
      path: ~/CodeWilds/inbox
      formats: [md, org, json]
    - direction: emit
      path: ~/CodeWilds/export
      formats: [json, csv]
ui:
  type: desktop
  framework: pyqt
  controlChannel: http://127.0.0.1:7878  # how UI talks to core
  automation:
    - protocol: jsonrpc-2.0
      methods: [openNote, focusTopic]
extensions:              # where others can plug in
  plugins:
    mechanism: jsonrpc-2.0
    discovery: exec:$PATH/mindweaver-plugin-*
    contracts:
      - name: onNoteSaved
        requestRef: ./schemas/hooks/onNoteSaved.request.json
security:
  auth: none | token | oauth2
  permissions:
    - name: fs.read
      scope: ~/Notes
compatibility:
  requires:
    - capability: ideomancer.Project
      version: ^0.2.0
links:
  docs: ./docs/README.md
  repo: https://github.com/codewilds/mindweaver